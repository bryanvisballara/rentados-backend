services:
  - type: web
    name: rentados-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm --prefix web install && npm --prefix web run build && node scripts/postbuild.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://rentados-backend.onrender.com
      - key: RUN_DB_SYNC
        value: "true"
      - key: DEPLOY_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
